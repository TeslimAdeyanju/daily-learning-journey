name: Daily Learning Contribution

on:
  schedule:
    - cron: "30 8 * * *"   # 8:30 AM UTC (Morning check-in)
    - cron: "0 13 * * *"   # 1:00 PM UTC (Lunch check-in)
    - cron: "30 17 * * *"  # 5:30 PM UTC (Evening check-in)
    - cron: "0 21 * * *"   # 9:00 PM UTC (Night check-in + email summary)
  workflow_dispatch:

jobs:
  daily-learning:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch real GitHub activity and generate log
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_USERNAME: TeslimAdeyanju
        run: |
          mkdir -p logs

          DATE=$(date +%Y-%m-%d)
          TIME=$(date +%H:%M)
          DAY=$(date +%A)
          SINCE="${DATE}T00:00:00Z"
          THIS_REPO="${{ github.repository }}"

          # Pull today's push events for the user, excluding this journey repo itself
          curl -s -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/$GITHUB_USERNAME/events?per_page=100" \
            | jq --arg since "$SINCE" --arg repo "$THIS_REPO" \
              '[.[] | select(.type == "PushEvent") | select(.created_at >= $since) | select(.repo.name != $repo)]' \
            > /tmp/push_events.json

          COMMIT_COUNT=$(jq '[.[].payload.commits[]] | length' /tmp/push_events.json)
          REPOS=$(jq -r '[.[].repo.name] | unique | join(", ")' /tmp/push_events.json)

          {
            echo "# Daily Learning Log - $DATE"
            echo ""
            echo "## 📅 $DAY Activity Summary - $TIME UTC"
            echo ""
            if [ "$COMMIT_COUNT" -gt 0 ]; then
              echo "### 🎯 Real GitHub activity today:"
              echo "- $COMMIT_COUNT commit(s) across: $REPOS"
              echo ""
              echo "### 📝 Commit messages:"
              jq -r '.[].payload.commits[].message' /tmp/push_events.json | sed 's/^/- /'
            else
              echo "### 🎯 No commits recorded yet today."
            fi
            echo ""
            echo "---"
            echo "*Generated at $TIME UTC on $DATE*"
          } > "logs/$DATE.md"

          {
            echo "# 📚 Daily Learning Journey"
            echo ""
            echo "🎯 **Mission**: Automatically tracking my real GitHub activity."
            echo ""
            echo "## 📊 Today's Activity ($DATE)"
            echo ""
            echo "**Last updated**: $DATE at $TIME UTC"
            echo ""
            if [ "$COMMIT_COUNT" -gt 0 ]; then
              echo "### 🔥 $COMMIT_COUNT commit(s) today across: $REPOS"
            else
              echo "### No commits yet today."
            fi
            echo ""
            echo "## 🗂️ Learning Logs"
            echo ""
            echo "All daily activity is documented in the [logs/](./logs/) folder."
          } > README.md

          echo "COMMIT_COUNT=$COMMIT_COUNT" >> "$GITHUB_ENV"
          echo "REPOS=$REPOS" >> "$GITHUB_ENV"

      - name: Commit and push changes
        run: |
          git config --local user.email "teslim@adeyanjuteslim.co.uk"
          git config --local user.name "Teslim Adeyanju"
          git add .

          HOUR=$(date +%H)
          if [ $HOUR -lt 12 ]; then
            MESSAGE="🌅 Morning activity check - $(date +%Y-%m-%d)"
          elif [ $HOUR -lt 17 ]; then
            MESSAGE="☀️ Afternoon activity check - $(date +%Y-%m-%d)"
          else
            MESSAGE="🌙 Evening activity check - $(date +%Y-%m-%d)"
          fi

          git commit -m "$MESSAGE" || echo "No changes to commit"

          # Retry push with rebase in case another run pushed in the meantime
          for i in 1 2 3 4 5; do
            git push && break
            echo "Push rejected, pulling and retrying ($i/5)..."
            git pull --rebase origin main
            sleep $((RANDOM % 5 + 1))
          done

      - name: Determine if this is the final run of the day
        id: check_time
        run: |
          HOUR=$(date +%H)
          if [ "$HOUR" -ge 20 ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_email=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_email=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send daily summary email
        if: steps.check_time.outputs.should_email == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Daily GitHub Activity Summary - ${{ env.COMMIT_COUNT }} commits"
          to: adeyanjuteslim@gmail.com
          from: Daily Learning Journey Bot
          body: |
            Today's real GitHub activity summary:

            Commits: ${{ env.COMMIT_COUNT }}
            Repos: ${{ env.REPOS }}

            Full log: https://github.com/${{ github.repository }}
